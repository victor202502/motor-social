version: '3.8'

services:
  motor-db:
    image: postgres:16
    container_name: motor-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: motor_social_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: motor-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@motor.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - motor-db

  motor-app:
    build: ./backend
    container_name: motor-app
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - motor-db

  motor-front:
    build: ./frontend
    container_name: motor-front
    restart: always
    env_file:
      - ./frontend/.env
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - motor-app

  nginx:
    image: nginx:alpine
    container_name: motor-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - motor-front
      - motor-app

  certbot:
    image: certbot/certbot
    container_name: motor-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Este comando intentará renovar los certificados cada 12 horas automáticamente
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"