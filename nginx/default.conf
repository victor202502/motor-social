server {
    listen 80;

    # 1. Tráfico para el Frontend
    location / {
        proxy_pass http://motor-front:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Tráfico para el API (Backend)
    location /api/ {
        # El rewrite elimina el "/api" antes de mandarlo al backend 
        # para que tu Express reciba "/" en lugar de "/api/"
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://motor-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}