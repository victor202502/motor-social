server {
    listen 80;
    server_name motorsocial.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Nginx esta vivo para el desafio de Certbot";
    }
}

server {
    listen 443 ssl;
    server_name motorsocial.duckdns.org;

    # Rutas de los certificados (Se crearán con el comando de Certbot)
    ssl_certificate /etc/letsencrypt/live/motorsocial.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motorsocial.duckdns.org/privkey.pem;

    # Configuración de seguridad SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. Tráfico para el Frontend
    location / {
        proxy_pass http://motor-front:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Tráfico para el API (Backend)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://motor-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}